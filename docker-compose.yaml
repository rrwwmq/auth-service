services:
  postgres:
    image: postgres:15-bookworm
    container_name: auth_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auth_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: auth_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: